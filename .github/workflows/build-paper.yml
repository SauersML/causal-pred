name: build-paper

on:
  push:
    branches: [main]
    paths:
      - 'paper/**'
      - '.github/workflows/build-paper.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-paper-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Cache Tectonic resources
        uses: actions/cache@v4
        with:
          path: ~/.cache/Tectonic
          key: tectonic-${{ runner.os }}-v1
          enableCrossOsArchive: false

      - name: Install Tectonic
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 \
            https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%400.15.0/tectonic-0.15.0-x86_64-unknown-linux-musl.tar.gz \
            | sudo tar -xz -C /usr/local/bin tectonic
          tectonic --version

      - name: Compile paper/main.tex
        working-directory: paper
        run: tectonic --chatter minimal --keep-logs main.tex

      - name: Commit and push PDF
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f paper/main.pdf
          git diff --cached --quiet && { echo "No PDF changes."; exit 0; }
          git commit -m "Build paper PDF [skip ci]"
          # Fast path: push directly. Only rebase if main moved.
          git push origin HEAD:main && exit 0
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin HEAD:main && exit 0
          done
          echo "Failed to push after retries" >&2
          exit 1
